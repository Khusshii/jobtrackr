name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobtrackr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Setup backend env
        working-directory: ./backend
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/jobtrackr_test" >> .env
          echo "JWT_SECRET=ci-test-secret-jobtrackr" >> .env
          echo "PORT=3001" >> .env
          echo "FRONTEND_URL=http://localhost:5173" >> .env

      - name: Run Prisma migrations
        working-directory: ./backend
        run: npx prisma db push

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Setup frontend env
        working-directory: ./frontend
        run: echo "VITE_API_URL=http://localhost:3001/api" >> .env

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install wait-on
        run: npm install -g wait-on

      - name: Start backend
        working-directory: ./backend
        run: npm run dev &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/jobtrackr_test
          JWT_SECRET: ci-test-secret-jobtrackr
          PORT: 3001

      - name: Start frontend
        working-directory: ./frontend
        run: npm run dev &

      - name: Wait for servers
        run: wait-on http://localhost:3001/api/health http://localhost:5173 --timeout 60000

      - name: Seed test user
        run: |
          curl -X POST http://localhost:3001/api/auth/register \
            -H "Content-Type: application/json" \
            -d '{"name":"Test User","email":"test@test.com","password":"test1234"}'

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          